<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Create Account | Bag - Handcrafted Excellence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #faf7f0 0%, #f0ebe0 100%); min-height: 100vh; }
        
        /* Navbar */
        .navbar {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(12px);
            padding: 15px 0;
            transition: all 0.3s ease;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.03);
        }
        .navbar.scrolled { padding: 10px 0; box-shadow: 0 5px 25px rgba(0,0,0,0.08); }
        .navbar .container { max-width: 1400px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { 
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px; 
            font-weight: 700; 
            color: #2d2a24;
            text-decoration: none;
            letter-spacing: 1px;
        }
        .logo span { color: #c4a747; font-weight: 800; }
        .nav-links { display: flex; gap: 35px; align-items: center; }
        .nav-links a { text-decoration: none; color: #3d3a35; font-weight: 500; transition: 0.3s; font-size: 14px; }
        .nav-links a:hover { color: #c4a747; }
        .nav-icons { display: flex; gap: 22px; align-items: center; }
        .nav-icons a { color: #2d2a24; font-size: 18px; position: relative; text-decoration: none; }
        .nav-icons a:hover { color: #c4a747; }
        .cart-badge, .wish-badge {
            position: absolute; top: -8px; right: -12px; background: #c4a747; color: white;
            border-radius: 50%; width: 18px; height: 18px; font-size: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        
        /* Mobile Menu */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            color: #2d2a24;
            cursor: pointer;
            padding: 5px 10px;
            z-index: 1001;
        }
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
        .menu-overlay.show { display: block; }
        
        @media (max-width: 992px) {
            .mobile-menu-btn { display: block; }
            .nav-links { 
                position: fixed;
                top: 0;
                left: -100%;
                width: 280px;
                height: 100vh;
                background: white;
                flex-direction: column;
                padding: 80px 25px 30px;
                transition: 0.3s ease-in-out;
                box-shadow: 2px 0 20px rgba(0,0,0,0.1);
                z-index: 1000;
                gap: 15px;
                align-items: flex-start;
                overflow-y: auto;
            }
            .nav-links.show { left: 0; }
            .nav-links a { 
                font-size: 16px; 
                padding: 10px 0;
                width: 100%;
                border-bottom: 1px solid #f0ebe0;
            }
            .nav-icons { margin-left: auto; margin-right: 15px; }
        }
        
        @media (max-width: 576px) {
            .nav-icons { gap: 12px; }
            .nav-icons a { font-size: 16px; }
            .logo { font-size: 22px; }
        }
        
        /* Register Container */
        .register-container { min-height: calc(100vh - 200px); display: flex; align-items: center; padding: 60px 0; }
        .register-card {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.08);
            transition: transform 0.3s;
        }
        .register-card:hover { transform: translateY(-5px); }
        .register-header {
            background: linear-gradient(135deg, #2d2a24, #3d3a35);
            padding: 30px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .register-header::before {
            content: '🎁';
            position: absolute;
            font-size: 80px;
            opacity: 0.08;
            bottom: -20px;
            right: -20px;
        }
        .register-header h2 { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .register-header p { font-size: 14px; opacity: 0.8; margin-bottom: 0; }
        .register-body { padding: 30px; }
        
        @media (max-width: 768px) {
            .register-container { padding: 40px 0; }
            .register-body { padding: 25px; }
            .register-header { padding: 25px; }
            .register-header h2 { font-size: 24px; }
        }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { font-weight: 600; margin-bottom: 8px; display: block; color: #2d2a24; font-size: 14px; }
        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-group i {
            position: absolute;
            left: 16px;
            color: #c4a747;
            z-index: 10;
        }
        .form-control {
            width: 100%;
            padding: 12px 16px 12px 48px;
            border: 2px solid #e0dbd3;
            border-radius: 16px;
            transition: 0.3s;
            font-size: 14px;
        }
        .form-control:focus {
            outline: none;
            border-color: #c4a747;
            box-shadow: 0 0 0 3px rgba(196,167,71,0.1);
        }
        .password-toggle {
            position: absolute;
            right: 16px;
            cursor: pointer;
            color: #a0aaba;
            z-index: 10;
        }
        
        /* Password Strength Meter */
        .password-strength { margin-top: 10px; }
        .strength-bar {
            height: 4px;
            background: #e0dbd3;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 6px;
        }
        .strength-progress { height: 100%; width: 0%; transition: width 0.3s, background 0.3s; }
        .strength-text { font-size: 11px; margin-top: 5px; }
        .strength-text.weak { color: #dc3545; }
        .strength-text.fair { color: #ffc107; }
        .strength-text.good { color: #17a2b8; }
        .strength-text.strong { color: #28a745; }
        
        .requirements {
            list-style: none;
            padding: 0;
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .requirements li { font-size: 10px; color: #a0aaba; display: flex; align-items: center; gap: 5px; }
        .requirements li i { font-size: 8px; }
        .requirements li.valid { color: #28a745; }
        .requirements li.invalid { color: #dc3545; }
        
        .terms-group { margin: 20px 0; }
        .terms-group label { display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: normal; font-size: 13px; }
        .terms-group a { color: #c4a747; text-decoration: none; }
        .terms-group input { width: 16px; height: 16px; cursor: pointer; }
        
        .btn-register {
            background: #2d2a24;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 50px;
            font-weight: 700;
            width: 100%;
            transition: 0.3s;
        }
        .btn-register:hover { background: #c4a747; transform: translateY(-2px); }
        
        .divider { text-align: center; margin: 25px 0; position: relative; }
        .divider::before { content: ''; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #e0dbd3; }
        .divider span { background: white; padding: 0 20px; position: relative; color: #a0aaba; font-size: 12px; }
        
        .social-login { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .social-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0dbd3;
            border-radius: 50px;
            background: white;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 500;
            font-size: 13px;
            cursor: pointer;
        }
       
        
        .login-link { text-align: center; margin-top: 25px; padding-top: 25px; border-top: 1px solid #e0dbd3; font-size: 14px; }
        .login-link a { color: #c4a747; text-decoration: none; font-weight: 600; }
        
        @media (max-width: 576px) {
            .social-login { flex-direction: column; }
            .social-btn { justify-content: center; }
        }
        
        .alert-message {
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
            font-size: 13px;
        }
        .alert-message.success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
        .alert-message.error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
        @keyframes slideIn { from { transform: translateY(-15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .toast-notification {
            position: fixed; bottom: 30px; right: 30px; background: #2d2a24; color: white;
            padding: 10px 20px;
            border-radius: 50px;
            z-index: 9999;
            animation: slideInRight 0.3s ease;
            font-size: 13px;
        }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .footer { background: #1a1a18; color: #a0a09b; padding: 40px 0; margin-top: 60px; text-align: center; }
        .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 700; color: white; margin-bottom: 10px; }
        .footer-logo span { color: #c4a747; }
        
        .back-to-top {
            position: fixed; bottom: 30px; left: 30px; width: 40px; height: 40px;
            background: #c4a747; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; color: white; cursor: pointer; opacity: 0;
            visibility: hidden; transition: 0.3s; z-index: 1000;
        }
        .back-to-top.show { opacity: 1; visibility: visible; }
        
        @media (max-width: 576px) {
            .back-to-top { width: 35px; height: 35px; bottom: 20px; left: 20px; }
        }
    </style>
</head>
<body>

<nav class="navbar fixed-top">
    <div class="container">
        <a href="/" class="logo"><span>BAG</span></a>
        <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
        <div class="nav-links" id="navLinks">
            <a href="/">Home</a>
            <a href="/shop/">Shop</a>
            <a href="/collections/">Collections</a>
            <a href="/about/">About</a>
            <a href="/contact/">Contact</a>
        </div>
        <div class="nav-icons">
            <a href="/user/wishlist/"><i class="far fa-heart"></i><span class="wish-badge" id="wishlistCount">0</span></a>
            <a href="/user/cart/"><i class="fas fa-shopping-bag"></i><span class="cart-badge" id="cartCount">0</span></a>
        </div>
    </div>
</nav>
<div class="menu-overlay" id="menuOverlay"></div>

<div class="register-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="register-card" data-aos="fade-up">
                    <div class="register-header">
                        <i class="fas fa-user-plus fa-2x mb-2"></i>
                        <h2>Create Account</h2>
                        <p>Join the Bag family</p>
                    </div>
                    <div class="register-body">
                        <div id="alertMessage" class="alert-message"></div>
                        
                        <form id="registerForm">
                            <div class="form-group">
                                <label>Full Name <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <i class="fas fa-user"></i>
                                    <input type="text" id="fullName" class="form-control" placeholder="John Doe" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Email Address <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <i class="fas fa-envelope"></i>
                                    <input type="email" id="email" class="form-control" placeholder="hello@bag.com" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Phone Number (Optional)</label>
                                <div class="input-group">
                                    <i class="fas fa-phone"></i>
                                    <input type="tel" id="phone" class="form-control" placeholder="+91 XXXXX XXXXX">
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Password <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <i class="fas fa-lock"></i>
                                    <input type="password" id="password" class="form-control" placeholder="Create a strong password" required>
                                    <span class="password-toggle" id="togglePassword"><i class="fas fa-eye"></i></span>
                                </div>
                                <div class="password-strength">
                                    <div class="strength-bar"><div class="strength-progress" id="strengthProgress"></div></div>
                                    <div class="strength-text" id="strengthText"></div>
                                </div>
                                <ul class="requirements" id="passwordRequirements">
                                    <li id="req-length"><i class="fas fa-circle"></i> 6+ characters</li>
                                    <li id="req-uppercase"><i class="fas fa-circle"></i> Uppercase</li>
                                    <li id="req-lowercase"><i class="fas fa-circle"></i> Lowercase</li>
                                    <li id="req-number"><i class="fas fa-circle"></i> Number</li>
                                    <li id="req-special"><i class="fas fa-circle"></i> Special (!@#$%^&*)</li>
                                </ul>
                            </div>
                            <div class="form-group">
                                <label>Confirm Password <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <i class="fas fa-check-circle"></i>
                                    <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm your password" required>
                                    <span class="password-toggle" id="toggleConfirmPassword"><i class="fas fa-eye"></i></span>
                                </div>
                                <div id="passwordMatchError" style="font-size:11px; color:#dc3545; margin-top:5px; display:none;">Passwords do not match</div>
                            </div>
                            
                            <div class="terms-group">
                                <label>
                                    <input type="checkbox" id="terms" required>
                                    <span>I agree to the <a href="/terms/">Terms of Service</a> and <a href="/privacy/">Privacy Policy</a></span>
                                </label>
                            </div>
                            
                            <button type="submit" class="btn-register" id="registerBtn">
                                <i class="fas fa-user-plus me-2"></i>Create Account
                            </button>
                        </form>   
                        
                        <div class="login-link">
                            <p>Already have an account? <a href="/login/"><i class="fas fa-sign-in-alt me-1"></i>Sign In</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="container">
        <div class="footer-logo mb-2"><span>BAG</span></div>
        <small>&copy; 2024 Bag. All rights reserved. | Crafted with ❤️</small>
    </div>
</footer>

<div class="back-to-top" id="backToTop"><i class="fas fa-arrow-up"></i></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ duration: 800, once: true });
    
    // Mobile Menu Toggle
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const navLinks = document.getElementById('navLinks');
    const menuOverlay = document.getElementById('menuOverlay');
    function closeMenu() { navLinks.classList.remove('show'); menuOverlay.classList.remove('show'); if(mobileMenuBtn){const icon=mobileMenuBtn.querySelector('i');icon.classList.remove('fa-times');icon.classList.add('fa-bars');} document.body.style.overflow=''; }
    function openMenu() { navLinks.classList.add('show'); menuOverlay.classList.add('show'); if(mobileMenuBtn){const icon=mobileMenuBtn.querySelector('i');icon.classList.remove('fa-bars');icon.classList.add('fa-times');} document.body.style.overflow='hidden'; }
    if(mobileMenuBtn){ mobileMenuBtn.addEventListener('click',(e)=>{ e.stopPropagation(); if(navLinks.classList.contains('show')) closeMenu(); else openMenu(); }); }
    if(menuOverlay){ menuOverlay.addEventListener('click', closeMenu); }
    document.querySelectorAll('#navLinks a').forEach(link=>{ link.addEventListener('click', closeMenu); });
    
    // Back to top
    const backToTop = document.getElementById('backToTop');
    window.addEventListener('scroll', () => { backToTop.classList.toggle('show', window.scrollY > 300); });
    backToTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    
    // Navbar scroll effect
    window.addEventListener('scroll', () => { document.querySelector('.navbar')?.classList.toggle('scrolled', window.scrollY > 50); });
    
    const API_BASE = window.location.origin + '/api';
    
    function updateBadges() {
        const cart = JSON.parse(localStorage.getItem('_cart')) || [];
        const wishlist = JSON.parse(localStorage.getItem('_wishlist')) || [];
        document.getElementById('cartCount').innerText = cart.reduce((s, i) => s + i.quantity, 0);
        document.getElementById('wishlistCount').innerText = wishlist.length;
    }
    
    function showAlert(message, type = 'error') {
        const alertDiv = document.getElementById('alertMessage');
        alertDiv.className = `alert-message ${type}`;
        alertDiv.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'} me-2"></i>${message}`;
        alertDiv.style.display = 'block';
        setTimeout(() => { alertDiv.style.display = 'none'; }, 5000);
    }
    
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.style.backgroundColor = isError ? '#dc2626' : '#2d2a24';
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'} me-2"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // Password strength checker
    function checkPasswordStrength(password) {
        let strength = 0;
        const requirements = {
            length: password.length >= 6,
            uppercase: /[A-Z]/.test(password),
            lowercase: /[a-z]/.test(password),
            number: /[0-9]/.test(password),
            special: /[!@#$%^&*(),.?":{}|<>]/.test(password)
        };
        
        document.getElementById('req-length').className = requirements.length ? 'valid' : 'invalid';
        document.getElementById('req-uppercase').className = requirements.uppercase ? 'valid' : 'invalid';
        document.getElementById('req-lowercase').className = requirements.lowercase ? 'valid' : 'invalid';
        document.getElementById('req-number').className = requirements.number ? 'valid' : 'invalid';
        document.getElementById('req-special').className = requirements.special ? 'valid' : 'invalid';
        
        if (requirements.length) strength++;
        if (requirements.uppercase) strength++;
        if (requirements.lowercase) strength++;
        if (requirements.number) strength++;
        if (requirements.special) strength++;
        
        const progress = document.getElementById('strengthProgress');
        const text = document.getElementById('strengthText');
        
        if (password.length === 0) {
            progress.style.width = '0%';
            text.innerHTML = '';
            return 0;
        }
        
        if (strength <= 2) {
            progress.style.width = '25%';
            progress.style.background = '#dc3545';
            text.innerHTML = 'Weak password';
            text.className = 'strength-text weak';
        } else if (strength <= 3) {
            progress.style.width = '50%';
            progress.style.background = '#ffc107';
            text.innerHTML = 'Fair password';
            text.className = 'strength-text fair';
        } else if (strength <= 4) {
            progress.style.width = '75%';
            progress.style.background = '#17a2b8';
            text.innerHTML = 'Good password';
            text.className = 'strength-text good';
        } else {
            progress.style.width = '100%';
            progress.style.background = '#28a745';
            text.innerHTML = 'Strong password!';
            text.className = 'strength-text strong';
        }
        return strength;
    }
    
    // Check password match
    function checkPasswordMatch() {
        const password = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;
        const errorDiv = document.getElementById('passwordMatchError');
        if (confirm.length > 0 && password !== confirm) {
            errorDiv.style.display = 'block';
            return false;
        } else {
            errorDiv.style.display = 'none';
            return true;
        }
    }
    
    // Email validation
    function validateEmail(email) {
        return /^[^\s@]+@([^\s@.,]+\.)+[^\s@.,]{2,}$/.test(email);
    }
    
    // Phone validation
    function validatePhone(phone) {
        if (!phone) return true;
        return /^[\+\d\s-]{10,15}$/.test(phone);
    }
    
    // Password toggle
    const togglePassword = document.getElementById('togglePassword');
    const passwordField = document.getElementById('password');
    if (togglePassword && passwordField) {
        togglePassword.addEventListener('click', function() {
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);
            this.querySelector('i').classList.toggle('fa-eye');
            this.querySelector('i').classList.toggle('fa-eye-slash');
        });
    }
    
    const toggleConfirm = document.getElementById('toggleConfirmPassword');
    const confirmField = document.getElementById('confirmPassword');
    if (toggleConfirm && confirmField) {
        toggleConfirm.addEventListener('click', function() {
            const type = confirmField.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmField.setAttribute('type', type);
            this.querySelector('i').classList.toggle('fa-eye');
            this.querySelector('i').classList.toggle('fa-eye-slash');
        });
    }
    
    // Real-time validation
    document.getElementById('password').addEventListener('input', function() {
        checkPasswordStrength(this.value);
        checkPasswordMatch();
    });
    document.getElementById('confirmPassword').addEventListener('input', checkPasswordMatch);
    
    function socialRegister(provider) {
        showAlert(`${provider} registration coming soon! Please use email registration for now.`, 'error');
    }
    
    // Handle registration form submission
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const fullName = document.getElementById('fullName').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const terms = document.getElementById('terms').checked;
        const registerBtn = document.getElementById('registerBtn');
        
        if (!fullName || !email || !password) {
            showAlert('Please fill in all required fields', 'error');
            return;
        }
        
        if (!validateEmail(email)) {
            showAlert('Please enter a valid email address', 'error');
            return;
        }
        
        if (phone && !validatePhone(phone)) {
            showAlert('Please enter a valid phone number', 'error');
            return;
        }
        
        if (password !== confirmPassword) {
            showAlert('Passwords do not match', 'error');
            return;
        }
        
        const strength = checkPasswordStrength(password);
        if (strength < 3) {
            showAlert('Please create a stronger password', 'error');
            return;
        }
        
        if (!terms) {
            showAlert('Please accept the Terms and Conditions', 'error');
            return;
        }
        
        registerBtn.disabled = true;
        registerBtn.innerHTML = '<span class="spinner"></span> Creating account...';
        
        try {
            const response = await fetch(`${API_BASE}/auth/register/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ full_name: fullName, email, phone, password, password2: confirmPassword })
            });
            
            const data = await response.json();
            
            if (response.ok && data.success) {
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);
                if (data.user) localStorage.setItem('user', JSON.stringify(data.user));
                
                showAlert('Registration successful! Welcome to Bag! 🎉', 'success');
                showToast('Account created! Redirecting to dashboard');
                
                setTimeout(() => {
                    if (data.user && (data.user.is_staff || data.user.is_superuser)) {
                        window.location.href = '/admin-dashboard/';
                    } else {
                        window.location.href = '/user/dashboard/';
                    }
                }, 1800);
            } else {
                const errorMsg = data.errors?.email?.[0] || data.errors?.phone?.[0] || data.error || 'Registration failed. Please try again.';
                showAlert(errorMsg, 'error');
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Create Account';
            }
        } catch (error) {
            console.error('Registration error:', error);
            showAlert('Network error. Please try again.', 'error');
            registerBtn.disabled = false;
            registerBtn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Create Account';
        }
    });
    
    updateBadges();
</script>
</body>
</html>
