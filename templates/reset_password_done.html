<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Successful | Bag</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #faf7f0 0%, #f0ebe0 100%); min-height: 100vh; }
        
        .navbar {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(12px);
            padding: 18px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; color: #2d2a24; text-decoration: none; }
        .logo span { color: #c4a747; }
        
        .done-container { min-height: calc(100vh - 200px); display: flex; align-items: center; padding: 80px 0; }
        .done-card {
            background: white;
            border-radius: 32px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.08);
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: #d4edda;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .success-icon i { font-size: 40px; color: #28a745; }
        .done-card h2 { font-family: 'Cormorant Garamond', serif; font-size: 32px; margin-bottom: 15px; }
        .btn-login {
            background: #c4a747;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }
        .btn-login:hover { background: #a88930; color: white; }
        .footer { background: #1a1a18; color: #a0a09b; padding: 40px 0; margin-top: 60px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo"> <span>BAG</span></a>
        </div>
    </nav>

    <div class="done-container">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="done-card">
                        <div class="success-icon">
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <h2>Password Reset Successful!</h2>
                        <p class="text-muted mb-3">
                            Your password has been successfully reset. You can now log in with your new password.
                        </p>
                        <div class="alert alert-success">
                            <i class="fas fa-check-circle me-2"></i>
                            Your account is now secure with your new password.
                        </div>
                        <a href="/login/" class="btn-login">
                            <i class="fas fa-sign-in-alt me-2"></i>Login Now
                        </a>
                        <div class="mt-3">
                            <a href="/" class="text-decoration-none" style="color: #c4a747;">
                                <i class="fas fa-home me-1"></i>Back to Home
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container text-center">
            <small>&copy; 2024 Bag. All rights reserved.</small>
        </div>
    </footer>

    <script>
        // Auto redirect to login after 5 seconds
        setTimeout(() => {
            window.location.href = '/login/';
        }, 5000);
    </script>
</body>
</html>
