<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Bag - Handcrafted Excellence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #faf7f0 0%, #f0ebe0 100%); min-height: 100vh; }
        
        .navbar {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(12px);
            padding: 18px 0;
            transition: all 0.3s ease;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar .container { max-width: 1400px; }
        .logo { 
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px; 
            font-weight: 700; 
            color: #2d2a24;
            text-decoration: none;
            letter-spacing: 1px;
        }
        .logo span { color: #c4a747; font-weight: 800; }
        .nav-links { display: flex; gap: 35px; align-items: center; }
        .nav-links a { text-decoration: none; color: #3d3a35; font-weight: 500; transition: 0.3s; font-size: 14px; }
        .nav-links a:hover { color: #c4a747; }
        .nav-icons { display: flex; gap: 22px; align-items: center; }
        .nav-icons a { color: #2d2a24; font-size: 18px; position: relative; text-decoration: none; }
        .cart-badge, .wish-badge {
            position: absolute; top: -8px; right: -12px; background: #c4a747; color: white;
            border-radius: 50%; width: 18px; height: 18px; font-size: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        @media (max-width: 992px) { .nav-links { display: none; } }
        
        .forgot-container { min-height: calc(100vh - 200px); display: flex; align-items: center; padding: 80px 0; }
        .forgot-card {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.08);
            transition: transform 0.3s;
        }
        .forgot-card:hover { transform: translateY(-5px); }
        .forgot-header {
            background: linear-gradient(135deg, #2d2a24, #3d3a35);
            padding: 40px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .forgot-header::before {
            content: '🔐';
            position: absolute;
            font-size: 100px;
            opacity: 0.08;
            bottom: -20px;
            right: -20px;
        }
        .forgot-header h2 { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 700; margin-bottom: 10px; }
        .forgot-body { padding: 40px; }
        
        .step-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            position: relative;
        }
        .step {
            text-align: center;
            flex: 1;
            position: relative;
            z-index: 1;
        }
        .step .step-circle {
            width: 40px;
            height: 40px;
            background: #e0dbd3;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-weight: 700;
            color: #8e8c87;
            transition: all 0.3s;
        }
        .step.active .step-circle {
            background: #c4a747;
            color: white;
            box-shadow: 0 0 0 4px rgba(196,167,71,0.2);
        }
        .step.completed .step-circle {
            background: #28a745;
            color: white;
        }
        .step .step-label {
            font-size: 12px;
            color: #8e8c87;
        }
        .step.active .step-label { color: #c4a747; font-weight: 600; }
        .step.completed .step-label { color: #28a745; }
        
        .form-group { margin-bottom: 24px; }
        .form-group label { font-weight: 600; margin-bottom: 10px; display: block; color: #2d2a24; }
        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-group i {
            position: absolute;
            left: 16px;
            color: #c4a747;
            z-index: 10;
        }
        .form-control {
            width: 100%;
            padding: 14px 18px 14px 48px;
            border: 2px solid #e0dbd3;
            border-radius: 16px;
            transition: 0.3s;
            font-size: 14px;
        }
        .form-control:focus {
            outline: none;
            border-color: #c4a747;
            box-shadow: 0 0 0 3px rgba(196,167,71,0.1);
        }
        .password-toggle {
            position: absolute;
            right: 16px;
            cursor: pointer;
            color: #a0aaba;
            z-index: 10;
        }
        
        .btn-primary-custom {
            background: #2d2a24;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: 700;
            width: 100%;
            transition: 0.3s;
        }
        .btn-primary-custom:hover { background: #c4a747; transform: translateY(-2px); }
        .btn-secondary-custom {
            background: transparent;
            border: 2px solid #e0dbd3;
            color: #2d2a24;
            padding: 12px;
            border-radius: 50px;
            font-weight: 600;
            width: 100%;
            transition: 0.3s;
        }
        .btn-secondary-custom:hover { border-color: #c4a747; color: #c4a747; }
        
        .alert-message {
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }
        .alert-message.success { background: #d4edda; color: #155724; border-left: 4px solid #28a745; }
        .alert-message.error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
        .alert-message.info { background: #d1ecf1; color: #0c5460; border-left: 4px solid #17a2b8; }
        @keyframes slideIn { from { transform: translateY(-15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .resend-otp { text-align: center; margin-top: 15px; }
        .resend-otp button { background: none; border: none; color: #c4a747; font-weight: 600; cursor: pointer; }
        .timer { color: #6c757d; font-size: 13px; }
        
        .toast-notification {
            position: fixed; bottom: 30px; right: 30px; background: #2d2a24; color: white;
            padding: 12px 24px; border-radius: 50px; z-index: 9999; animation: slideInRight 0.3s ease;
        }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        .footer { background: #1a1a18; color: #a0a09b; padding: 40px 0; margin-top: 60px; }
        .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 700; color: white; }
        .footer-logo span { color: #c4a747; }
        
        @media (max-width: 768px) {
            .forgot-body { padding: 30px 25px; }
            .forgot-header { padding: 30px; }
            .step .step-label { font-size: 10px; }
        }
        
        .otp-input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .otp-input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            border: 2px solid #e0dbd3;
            border-radius: 12px;
        }
        .otp-input:focus {
            border-color: #c4a747;
            outline: none;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container">
        <a href="/" class="logo"> <span>BAG</span></a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/shop/">Shop</a>
            <a href="/collections/">Collections</a>
            <a href="/about/">About</a>
            <a href="/contact/">Contact</a>
        </div>
        <div class="nav-icons">
            <a href="/user/wishlist/"><i class="far fa-heart"></i><span class="wish-badge" id="wishlistCount">0</span></a>
            <a href="/user/cart/"><i class="fas fa-shopping-bag"></i><span class="cart-badge" id="cartCount">0</span></a>
        </div>
    </div>
</nav>

<div class="forgot-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="forgot-card" data-aos="fade-up">
                    <div class="forgot-header">
                        <i class="fas fa-key fa-3x mb-3"></i>
                        <h2>Forgot Password?</h2>
                        <p>Don't worry, we'll help you reset it</p>
                    </div>
                    <div class="forgot-body">
                        <!-- Step Indicator -->
                        <div class="step-indicator">
                            <div class="step" id="step1Indicator">
                                <div class="step-circle">1</div>
                                <div class="step-label">Request OTP</div>
                            </div>
                            <div class="step" id="step2Indicator">
                                <div class="step-circle">2</div>
                                <div class="step-label">Verify OTP</div>
                            </div>
                            <div class="step" id="step3Indicator">
                                <div class="step-circle">3</div>
                                <div class="step-label">Reset Password</div>
                            </div>
                        </div>

                        <div id="alertMessage" class="alert-message"></div>

                        <!-- Step 1: Request OTP -->
                        <div id="step1Form">
                            <form id="requestOtpForm">
                                <div class="form-group">
                                    <label>Email Address</label>
                                    <div class="input-group">
                                        <i class="fas fa-envelope"></i>
                                        <input type="email" id="resetEmail" class="form-control" placeholder="Enter your registered email" required>
                                    </div>
                                </div>
                                <button type="submit" class="btn-primary-custom" id="requestOtpBtn">
                                    <i class="fas fa-paper-plane me-2"></i>Send OTP
                                </button>
                            </form>
                        </div>

                        <!-- Step 2: Verify OTP -->
                        <div id="step2Form" style="display: none;">
                            <form id="verifyOtpForm">
                                <div class="form-group">
                                    <label>Enter OTP</label>
                                    <div class="otp-input-group" id="otpContainer">
                                        <input type="text" maxlength="1" class="otp-input" id="otp1" autofocus>
                                        <input type="text" maxlength="1" class="otp-input" id="otp2">
                                        <input type="text" maxlength="1" class="otp-input" id="otp3">
                                        <input type="text" maxlength="1" class="otp-input" id="otp4">
                                        <input type="text" maxlength="1" class="otp-input" id="otp5">
                                        <input type="text" maxlength="1" class="otp-input" id="otp6">
                                    </div>
                                </div>
                                <button type="submit" class="btn-primary-custom" id="verifyOtpBtn">
                                    <i class="fas fa-check-circle me-2"></i>Verify OTP
                                </button>
                                <div class="resend-otp">
                                    <button type="button" id="resendOtpBtn">Resend OTP</button>
                                    <span id="timerDisplay" class="timer"></span>
                                </div>
                            </form>
                        </div>

                        <!-- Step 3: Reset Password -->
                        <div id="step3Form" style="display: none;">
                            <form id="resetPasswordForm">
                                <div class="form-group">
                                    <label>New Password</label>
                                    <div class="input-group">
                                        <i class="fas fa-lock"></i>
                                        <input type="password" id="newPassword" class="form-control" placeholder="Enter new password" required>
                                        <span class="password-toggle" onclick="togglePassword('newPassword')"><i class="fas fa-eye"></i></span>
                                    </div>
                                    <small class="text-muted">Min 6 chars, 1 uppercase, 1 number</small>
                                </div>
                                <div class="form-group">
                                    <label>Confirm Password</label>
                                    <div class="input-group">
                                        <i class="fas fa-lock"></i>
                                        <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm new password" required>
                                        <span class="password-toggle" onclick="togglePassword('confirmPassword')"><i class="fas fa-eye"></i></span>
                                    </div>
                                </div>
                                <button type="submit" class="btn-primary-custom" id="resetPasswordBtn">
                                    <i class="fas fa-save me-2"></i>Reset Password
                                </button>
                            </form>
                        </div>

                        <div class="text-center mt-4">
                            <a href="/login/" class="text-decoration-none" style="color: #c4a747;">
                                <i class="fas fa-arrow-left me-1"></i>Back to Login
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="footer">
    <div class="container text-center">
        <div class="footer-logo mb-2"> <span>BAG</span></div>
        <small>&copy; 2024 Bag. All rights reserved. | Crafted with ❤️</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ duration: 800, once: true });
    
    const API_BASE = window.location.origin + '/api';
    let currentEmail = '';
    let otpTimer = null;
    let timeLeft = 60;
    
    function showAlert(message, type = 'error') {
        const alertDiv = document.getElementById('alertMessage');
        alertDiv.className = `alert-message ${type}`;
        alertDiv.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'info' ? 'info-circle' : 'exclamation-circle'} me-2"></i>${message}`;
        alertDiv.style.display = 'block';
        setTimeout(() => { alertDiv.style.display = 'none'; }, 5000);
    }
    
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast-notification';
        toast.style.backgroundColor = isError ? '#dc2626' : '#2d2a24';
        toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'} me-2"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function updateStep(step) {
        const steps = [1, 2, 3];
        steps.forEach(s => {
            const indicator = document.getElementById(`step${s}Indicator`);
            const form = document.getElementById(`step${s}Form`);
            if (s === step) {
                indicator.classList.add('active');
                indicator.classList.remove('completed');
                if (form) form.style.display = 'block';
            } else if (s < step) {
                indicator.classList.add('completed');
                indicator.classList.remove('active');
                if (form) form.style.display = 'none';
            } else {
                indicator.classList.remove('active', 'completed');
                if (form) form.style.display = 'none';
            }
        });
    }
    
    function togglePassword(fieldId) {
        const field = document.getElementById(fieldId);
        const icon = field.nextElementSibling?.querySelector('i') || field.parentElement?.querySelector('.password-toggle i');
        if (field.type === 'password') {
            field.type = 'text';
            if (icon) icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            field.type = 'password';
            if (icon) icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
    
    // OTP input auto-focus
    function setupOtpInputs() {
        const inputs = ['otp1', 'otp2', 'otp3', 'otp4', 'otp5', 'otp6'];
        inputs.forEach((id, index) => {
            const input = document.getElementById(id);
            if (input) {
                input.addEventListener('input', (e) => {
                    if (e.target.value.length === 1 && index < inputs.length - 1) {
                        document.getElementById(inputs[index + 1]).focus();
                    }
                });
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && !e.target.value && index > 0) {
                        document.getElementById(inputs[index - 1]).focus();
                    }
                });
            }
        });
    }
    
    function getOtpValue() {
        return `${document.getElementById('otp1').value}${document.getElementById('otp2').value}${document.getElementById('otp3').value}${document.getElementById('otp4').value}${document.getElementById('otp5').value}${document.getElementById('otp6').value}`;
    }
    
    function startTimer() {
        timeLeft = 60;
        const timerDisplay = document.getElementById('timerDisplay');
        const resendBtn = document.getElementById('resendOtpBtn');
        
        if (otpTimer) clearInterval(otpTimer);
        
        resendBtn.disabled = true;
        resendBtn.style.opacity = '0.5';
        
        otpTimer = setInterval(() => {
            timeLeft--;
            timerDisplay.innerHTML = ` (${timeLeft}s)`;
            
            if (timeLeft <= 0) {
                clearInterval(otpTimer);
                timerDisplay.innerHTML = '';
                resendBtn.disabled = false;
                resendBtn.style.opacity = '1';
            }
        }, 1000);
    }
    
    // Step 1: Request OTP
    document.getElementById('requestOtpForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('resetEmail').value.trim();
        if (!email) {
            showAlert('Please enter your email address', 'error');
            return;
        }
        
        const btn = document.getElementById('requestOtpBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Sending OTP...';
        
        try {
            const response = await fetch(`${API_BASE}/auth/forgot-password/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            
            const data = await response.json();
            
            if (response.ok && data.success) {
                currentEmail = email;
                showAlert('OTP sent to your email address!', 'success');
                updateStep(2);
                startTimer();
                setupOtpInputs();
                showToast('OTP sent successfully!');
            } else {
                const errorMsg = data.errors?.email?.[0] || data.error || 'Email not found';
                showAlert(errorMsg, 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            showAlert('Network error. Please try again.', 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-paper-plane me-2"></i>Send OTP';
        }
    });
    
    // Step 2: Verify OTP
    document.getElementById('verifyOtpForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const otp = getOtpValue();
        if (otp.length !== 6) {
            showAlert('Please enter the 6-digit OTP', 'error');
            return;
        }
        
        const btn = document.getElementById('verifyOtpBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Verifying...';
        
        try {
            const response = await fetch(`${API_BASE}/auth/verify-otp/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: currentEmail, otp })
            });
            
            const data = await response.json();
            
            if (response.ok && data.success) {
                showAlert('OTP verified successfully!', 'success');
                updateStep(3);
                if (otpTimer) clearInterval(otpTimer);
                showToast('OTP verified! Now set your new password.');
            } else {
                showAlert(data.errors?.otp?.[0] || 'Invalid OTP', 'error');
                // Clear OTP inputs
                for (let i = 1; i <= 6; i++) {
                    document.getElementById(`otp${i}`).value = '';
                }
                document.getElementById('otp1').focus();
            }
        } catch (error) {
            console.error('Error:', error);
            showAlert('Network error. Please try again.', 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-check-circle me-2"></i>Verify OTP';
        }
    });
    
    // Resend OTP
    document.getElementById('resendOtpBtn').addEventListener('click', async () => {
        if (!currentEmail) return;
        
        const btn = document.getElementById('resendOtpBtn');
        btn.disabled = true;
        btn.innerHTML = 'Sending...';
        
        try {
            const response = await fetch(`${API_BASE}/auth/forgot-password/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: currentEmail })
            });
            
            const data = await response.json();
            
            if (response.ok && data.success) {
                showAlert('New OTP sent to your email!', 'success');
                startTimer();
                // Clear OTP inputs
                for (let i = 1; i <= 6; i++) {
                    document.getElementById(`otp${i}`).value = '';
                }
                document.getElementById('otp1').focus();
            } else {
                showAlert('Failed to resend OTP', 'error');
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        } catch (error) {
            showAlert('Network error', 'error');
            btn.disabled = false;
            btn.style.opacity = '1';
        } finally {
            btn.innerHTML = 'Resend OTP';
        }
    });
    
    // Step 3: Reset Password
    document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const otp = getOtpValue();
        
        // Validate password
        if (newPassword.length < 6) {
            showAlert('Password must be at least 6 characters', 'error');
            return;
        }
        
        if (!/[A-Z]/.test(newPassword)) {
            showAlert('Password must contain at least one uppercase letter', 'error');
            return;
        }
        
        if (!/\d/.test(newPassword)) {
            showAlert('Password must contain at least one number', 'error');
            return;
        }
        
        if (newPassword !== confirmPassword) {
            showAlert('Passwords do not match', 'error');
            return;
        }
        
        const btn = document.getElementById('resetPasswordBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Resetting Password...';
        
        try {
            const response = await fetch(`${API_BASE}/auth/reset-password/`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: currentEmail,
                    otp: otp,
                    new_password: newPassword,
                    confirm_password: confirmPassword
                })
            });
            
            const data = await response.json();
            
            if (response.ok && data.success) {
                showAlert('Password reset successful! Redirecting to login...', 'success');
                showToast('Password reset successful! Please login with your new password.');
                
                setTimeout(() => {
                    window.location.href = '/login/';
                }, 2000);
            } else {
                const errorMsg = data.errors?.new_password?.[0] || data.errors?.confirm_password?.[0] || data.error || 'Failed to reset password';
                showAlert(errorMsg, 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            showAlert('Network error. Please try again.', 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save me-2"></i>Reset Password';
        }
    });
    
    function updateBadges() {
        const cart = JSON.parse(localStorage.getItem('_cart')) || [];
        const wishlist = JSON.parse(localStorage.getItem('_wishlist')) || [];
        document.getElementById('cartCount').innerText = cart.reduce((s, i) => s + (i.quantity || 1), 0);
        document.getElementById('wishlistCount').innerText = wishlist.length;
    }
    
    updateBadges();
</script>
