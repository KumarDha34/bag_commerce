<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | Bag</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #faf7f0 0%, #f0ebe0 100%); min-height: 100vh; }
        
        .navbar {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(12px);
            padding: 18px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; color: #2d2a24; text-decoration: none; }
        .logo span { color: #c4a747; }
        
        .verify-container { min-height: calc(100vh - 200px); display: flex; align-items: center; padding: 80px 0; }
        .verify-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.08);
        }
        .otp-input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 30px 0;
        }
        .otp-input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            border: 2px solid #e0dbd3;
            border-radius: 12px;
        }
        .otp-input:focus {
            border-color: #c4a747;
            outline: none;
        }
        .btn-verify {
            background: #c4a747;
            color: white;
            padding: 12px;
            border-radius: 50px;
            width: 100%;
            border: none;
            font-weight: 600;
        }
        .btn-verify:hover { background: #a88930; }
        .footer { background: #1a1a18; color: #a0a09b; padding: 40px 0; margin-top: 60px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo"> <span>BAG</span></a>
        </div>
    </nav>

    <div class="verify-container">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="verify-card">
                        <div class="text-center">
                            <i class="fas fa-shield-alt fa-3x" style="color: #c4a747;"></i>
                            <h2 class="mt-3">Verify OTP</h2>
                            <p class="text-muted">Enter the 6-digit code sent to your email</p>
                        </div>

                        <div id="alertMessage" class="alert-message" style="display: none;"></div>

                        <form id="verifyOtpForm">
                            <div class="otp-input-group">
                                <input type="text" maxlength="1" class="otp-input" id="otp1" autofocus>
                                <input type="text" maxlength="1" class="otp-input" id="otp2">
                                <input type="text" maxlength="1" class="otp-input" id="otp3">
                                <input type="text" maxlength="1" class="otp-input" id="otp4">
                                <input type="text" maxlength="1" class="otp-input" id="otp5">
                                <input type="text" maxlength="1" class="otp-input" id="otp6">
                            </div>
                            <button type="submit" class="btn-verify" id="verifyBtn">
                                <i class="fas fa-check-circle me-2"></i>Verify OTP
                            </button>
                        </form>

                        <div class="text-center mt-3">
                            <a href="/forgot-password/" class="text-decoration-none" style="color: #c4a747;">
                                <i class="fas fa-arrow-left me-1"></i>Back
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container text-center">
            <small>&copy; 2024 Bag. All rights reserved.</small>
        </div>
    </footer>

    <script>
        const API_BASE = window.location.origin + '/api';
        let currentEmail = sessionStorage.getItem('resetEmail') || '';

        // OTP input handling
        const inputs = ['otp1', 'otp2', 'otp3', 'otp4', 'otp5', 'otp6'];
        inputs.forEach((id, index) => {
            const input = document.getElementById(id);
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    document.getElementById(inputs[index + 1]).focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    document.getElementById(inputs[index - 1]).focus();
                }
            });
        });

        function getOtpValue() {
            let otp = '';
            for (let i = 1; i <= 6; i++) {
                otp += document.getElementById(`otp${i}`).value;
            }
            return otp;
        }

        document.getElementById('verifyOtpForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const otp = getOtpValue();
            if (otp.length !== 6) {
                showAlert('Please enter the 6-digit OTP', 'error');
                return;
            }

            const btn = document.getElementById('verifyBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Verifying...';

            try {
                const response = await fetch(`${API_BASE}/auth/verify-otp/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentEmail, otp })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    sessionStorage.setItem('otpVerified', 'true');
                    window.location.href = '/reset-password/';
                } else {
                    showAlert(data.errors?.otp?.[0] || 'Invalid OTP', 'error');
                    // Clear inputs
                    for (let i = 1; i <= 6; i++) {
                        document.getElementById(`otp${i}`).value = '';
                    }
                    document.getElementById('otp1').focus();
                }
            } catch (error) {
                showAlert('Network error. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-check-circle me-2"></i>Verify OTP';
            }
        });

        function showAlert(message, type) {
            const alertDiv = document.getElementById('alertMessage');
            alertDiv.className = `alert alert-${type === 'error' ? 'danger' : 'success'} mt-3`;
            alertDiv.innerHTML = message;
            alertDiv.style.display = 'block';
            setTimeout(() => { alertDiv.style.display = 'none'; }, 5000);
        }
    </script>
</body>
</html>
