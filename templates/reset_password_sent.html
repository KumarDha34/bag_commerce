<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Your Email | Bag</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #faf7f0 0%, #f0ebe0 100%); min-height: 100vh; }
        
        .navbar {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(12px);
            padding: 18px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; color: #2d2a24; text-decoration: none; }
        .logo span { color: #c4a747; }
        
        .sent-container { min-height: calc(100vh - 200px); display: flex; align-items: center; padding: 80px 0; }
        .sent-card {
            background: white;
            border-radius: 32px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.08);
        }
        .email-icon {
            width: 80px;
            height: 80px;
            background: rgba(196,167,71,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .email-icon i { font-size: 40px; color: #c4a747; }
        .sent-card h2 { font-family: 'Cormorant Garamond', serif; font-size: 32px; margin-bottom: 15px; }
        .btn-custom {
            background: #c4a747;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }
        .btn-custom:hover { background: #a88930; color: white; }
        .footer { background: #1a1a18; color: #a0a09b; padding: 40px 0; margin-top: 60px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo"> <span>BAG</span></a>
        </div>
    </nav>

    <div class="sent-container">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="sent-card">
                        <div class="email-icon">
                            <i class="fas fa-envelope-open-text"></i>
                        </div>
                        <h2>Check Your Email</h2>
                        <p class="text-muted mb-3">
                            We've sent a password reset OTP to <strong id="userEmail"></strong>
                        </p>
                        <div class="alert alert-info">
                            <i class="fas fa-info-circle me-2"></i>
                            The OTP is valid for 10 minutes. Please check your spam folder if you don't see it.
                        </div>
                        <a href="/verify-otp/" class="btn-custom">
                            <i class="fas fa-arrow-right me-2"></i>Enter OTP
                        </a>
                        <div class="mt-3">
                            <a href="/forgot-password/" class="text-decoration-none" style="color: #c4a747;">
                                <i class="fas fa-arrow-left me-1"></i>Try again
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container text-center">
            <small>&copy; 2024 Bag. All rights reserved.</small>
        </div>
    </footer>

    <script>
        // Display the email from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        if (email) {
            document.getElementById('userEmail').innerText = decodeURIComponent(email);
        }
    </script>
</body>
</html>
