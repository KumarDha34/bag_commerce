<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation - Bag</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #fefcf8; font-family: 'Inter', sans-serif; }
        .confirmation-card {
            background: white;
            border-radius: 24px;
            padding: 40px;
            border: 1px solid #f0ebe0;
            margin: 40px 0;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: #4caf50;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }
        .success-icon i { font-size: 40px; color: white; }
        .order-number {
            background: #fef9f0;
            padding: 15px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 18px;
            text-align: center;
            margin: 20px 0;
        }
        .info-section {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .info-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0ebe0;
        }
        .info-row {
            display: flex;
            padding: 8px 0;
            border-bottom: 1px dashed #e9ecef;
        }
        .info-label {
            width: 140px;
            font-weight: 600;
            color: #6c757d;
        }
        .info-value {
            flex: 1;
            color: #2d2a24;
        }
        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 600;
        }
        .status-pending { background: #ffc107; color: #856404; }
        .status-confirmed { background: #d4edda; color: #155724; }
        .status-awaiting { background: #cfe2ff; color: #084298; }
        .status-cancelled { background: #f8d7da; color: #721c24; }
        .btn-custom {
            background: #c4a747;
            color: white;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
            transition: all 0.3s;
        }
        .btn-custom:hover { background: #a88930; color: white; }
        .btn-outline-custom {
            background: transparent;
            border: 1px solid #c4a747;
            color: #c4a747;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            margin: 10px;
            transition: all 0.3s;
        }
        .btn-outline-custom:hover { background: #c4a747; color: white; }
        .order-item {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #fef9f0;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .order-item-img {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
        }
        .order-item-img i { font-size: 30px; color: #cbb99f; }
        .order-item-details { flex: 1; }
        .order-item-name { font-weight: 600; margin-bottom: 5px; }
        .order-item-price { color: #c4a747; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="confirmation-card">
                    <div class="text-center">
                        <div class="success-icon">
                            <i class="fas fa-check"></i>
                        </div>
                        <h2>Thank You for Your Order!</h2>
                        <p class="text-muted">Your order has been placed successfully</p>
                    </div>
                    
                    <div id="orderDetails" class="mt-4">
                        <div class="text-center py-4">
                            <div class="spinner-border text-warning"></div>
                            <p class="mt-2">Loading order details...</p>
                        </div>
                    </div>
                    
                    <div class="text-center mt-4">
                        <a href="/shop/" class="btn-custom">
                            <i class="fas fa-shopping-bag me-2"></i>Continue Shopping
                        </a>
                        <a href="/user/orders/" class="btn-outline-custom">
                            <i class="fas fa-list me-2"></i>View All Orders
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';
        
        function getOrderNumber() {
            const path = window.location.pathname;
            const match = path.match(/\/order-confirmation\/([^\/]+)/);
            return match ? match[1] : null;
        }
        
        function getStatusBadgeClass(status) {
            const classes = {
                'pending': 'status-pending',
                'awaiting_verification': 'status-awaiting',
                'confirmed': 'status-confirmed',
                'processing': 'status-confirmed',
                'shipped': 'status-confirmed',
                'delivered': 'status-confirmed',
                'cancelled': 'status-cancelled'
            };
            return classes[status] || 'status-pending';
        }
        
        function getStatusText(status) {
            const texts = {
                'pending': 'Pending Payment',
                'awaiting_verification': 'Awaiting Verification',
                'confirmed': 'Order Confirmed',
                'processing': 'Processing',
                'shipped': 'Shipped',
                'delivered': 'Delivered',
                'cancelled': 'Cancelled'
            };
            return texts[status] || status;
        }
        
        function getPaymentMethodText(paymentMethod) {
            if (!paymentMethod) return 'Not specified';
            return paymentMethod === 'cod' ? 'Cash on Delivery' : 'Bank QR / UPI';
        }
        
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-GB');
        }
        
        function formatCurrency(amount) {
            return '₹' + parseFloat(amount).toFixed(2);
        }
        
        async function loadOrderDetails() {
            const orderNumber = getOrderNumber();
            if (!orderNumber) {
                document.getElementById('orderDetails').innerHTML = '<div class="alert alert-danger">Order not found</div>';
                return;
            }
            
            try {
                const token = localStorage.getItem('access_token');
                const response = await fetch(`${API_BASE}/orders/track/${orderNumber}/`, {
                    headers: token ? { 'Authorization': `Bearer ${token}` } : {}
                });
                
                const data = await response.json();
                console.log('Order data:', data);
                
                if (data.success) {
                    const order = data.order;
                    
                    // Get payment method from order (you need to add this to your API response)
                    // For now, we'll check if it's COD or Bank QR based on order data
                    const paymentMethod = order.payment_method || 'cod'; // Default to COD if not specified
                    
                    // Build order items HTML
                    let itemsHtml = '';
                    if (order.items && order.items.length > 0) {
                        order.items.forEach(item => {
                            itemsHtml += `
                                <div class="order-item">
                                    <div class="order-item-img">
                                        ${item.product_details?.image ? 
                                            `<img src="${item.product_details.image}" style="width: 100%; height: 100%; object-fit: cover; border-radius: 12px;">` : 
                                            `<i class="fas fa-bag-shopping"></i>`
                                        }
                                    </div>
                                    <div class="order-item-details">
                                        <div class="order-item-name">${escapeHtml(item.product_name)}</div>
                                        <div class="small text-muted">Quantity: ${item.quantity}</div>
                                    </div>
                                    <div class="order-item-price">${formatCurrency(item.product_price)}</div>
                                </div>
                            `;
                        });
                    }
                    
                    document.getElementById('orderDetails').innerHTML = `
                        <div class="order-number">
                            <strong>Order Number:</strong> ${order.order_number}
                        </div>
                        
                        <div class="info-section">
                            <div class="info-title"><i class="fas fa-truck me-2"></i>Shipping Information</div>
                            <div class="info-row">
                                <div class="info-label">Full Name:</div>
                                <div class="info-value">${escapeHtml(order.full_name)}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Email:</div>
                                <div class="info-value">${escapeHtml(order.email)}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Phone:</div>
                                <div class="info-value">${escapeHtml(order.phone)}</div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Address:</div>
                                <div class="info-value">${escapeHtml(order.address)}</div>
                            </div>
                        </div>
                        
                        <div class="info-section">
                            <div class="info-title"><i class="fas fa-credit-card me-2"></i>Payment Information</div>
                            <div class="info-row">
                                <div class="info-label">Payment Method:</div>
                                <div class="info-value">
                                    <strong>${getPaymentMethodText(paymentMethod)}</strong>
                                    ${paymentMethod === 'cod' ? 
                                        '<span class="badge bg-success ms-2">Pay on Delivery</span>' : 
                                        '<span class="badge bg-info ms-2">Online Payment</span>'
                                    }
                                </div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Payment Status:</div>
                                <div class="info-value">
                                    <span class="status-badge ${getStatusBadgeClass(order.status)}">
                                        ${getStatusText(order.status)}
                                    </span>
                                </div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">Order Date:</div>
                                <div class="info-value">${formatDate(order.created_at)}</div>
                            </div>
                        </div>
                        
                        <div class="info-section">
                            <div class="info-title"><i class="fas fa-box me-2"></i>Order Items</div>
                            ${itemsHtml || '<p class="text-muted">No items found</p>'}
                            
                            <div class="mt-3 pt-2 border-top">
                                <div class="info-row">
                                    <div class="info-label">Subtotal:</div>
                                    <div class="info-value">${formatCurrency(order.subtotal)}</div>
                                </div>
                                <div class="info-row">
                                    <div class="info-label">Discount:</div>
                                    <div class="info-value">-${formatCurrency(order.discount_amount || 0)}</div>
                                </div>
                                <div class="info-row">
                                    <div class="info-label">Shipping:</div>
                                    <div class="info-value">Free</div>
                                </div>
                                <div class="info-row fw-bold">
                                    <div class="info-label">Total Amount:</div>
                                    <div class="info-value" style="color: #c4a747; font-size: 20px;">${formatCurrency(order.total_amount)}</div>
                                </div>
                            </div>
                        </div>
                        
                        ${paymentMethod === 'cod' ? `
                            <div class="alert alert-success mt-3">
                                <i class="fas fa-check-circle me-2"></i>
                                <strong>Cash on Delivery!</strong> 
                                Your order is confirmed! Please keep the exact cash amount ready for delivery.
                            </div>
                        ` : ''}
                        
                        ${order.status === 'awaiting_verification' ? `
                            <div class="alert alert-info mt-3">
                                <i class="fas fa-clock me-2"></i>
                                <strong>Payment Verification in Progress!</strong> 
                                Your payment is being verified by our team. You will receive a confirmation email within 24-48 hours.
                            </div>
                        ` : ''}
                        
                        ${order.status === 'confirmed' ? `
                            <div class="alert alert-success mt-3">
                                <i class="fas fa-check-circle me-2"></i>
                                <strong>Order Confirmed!</strong> 
                                Your order has been confirmed and will be processed soon.
                            </div>
                        ` : ''}
                    `;
                } else {
                    document.getElementById('orderDetails').innerHTML = '<div class="alert alert-danger">Order not found</div>';
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('orderDetails').innerHTML = '<div class="alert alert-danger">Error loading order details</div>';
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        loadOrderDetails();
    </script>
</body>
</html>
