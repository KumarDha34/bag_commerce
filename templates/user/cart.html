<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Shopping Cart - Bag | Luxury Handcrafted Bags</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #fefcf8; color: #2a2a2a; overflow-x: hidden; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c4a747; border-radius: 10px; }
        
        .navbar {
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(12px);
            padding: 15px 0;
            transition: all 0.3s ease;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.03);
        }
        .navbar.scrolled { padding: 10px 0; box-shadow: 0 5px 25px rgba(0,0,0,0.08); }
        .navbar .container { max-width: 1400px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { 
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px; 
            font-weight: 700; 
            color: #2d2a24;
            text-decoration: none;
            letter-spacing: 1px;
        }
        .logo span { color: #c4a747; font-weight: 800; }
        .nav-links { display: flex; gap: 35px; align-items: center; }
        .nav-links a { text-decoration: none; color: #3d3a35; font-weight: 500; transition: 0.3s; font-size: 14px; }
        .nav-links a:hover, .nav-links a.active { color: #c4a747; }
        .nav-icons { display: flex; gap: 22px; align-items: center; }
        .nav-icons a { color: #2d2a24; font-size: 18px; position: relative; text-decoration: none; }
        .nav-icons a:hover { color: #c4a747; }
        .cart-badge, .wish-badge {
            position: absolute; top: -8px; right: -12px; background: #c4a747; color: white;
            border-radius: 50%; width: 18px; height: 18px; font-size: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .auth-btn {
            background: #c4a747;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: 0.3s;
            display: inline-block;
        }
        .auth-btn:hover { background: #a88930; color: white; transform: translateY(-2px); }
        .user-menu { position: relative; display: inline-block; }
        .user-dropdown {
            position: absolute;
            top: 100%;
            right: 0;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            min-width: 180px;
            display: none;
            z-index: 1000;
            margin-top: 10px;
            border: 1px solid #f0ebe0;
        }
        .user-menu:hover .user-dropdown { display: block; }
        .user-dropdown a {
            display: block;
            padding: 12px 20px;
            color: #2d2a24;
            text-decoration: none;
            font-size: 13px;
            transition: 0.2s;
        }
        .user-dropdown a:hover { background: #fef9f0; color: #c4a747; }
        
        /* Mobile Menu */
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            color: #2d2a24;
            cursor: pointer;
            padding: 5px 10px;
            z-index: 1001;
        }
        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
        .menu-overlay.show { display: block; }
        
        @media (max-width: 992px) {
            .mobile-menu-btn { display: block; }
            .nav-links { 
                position: fixed;
                top: 0;
                left: -100%;
                width: 280px;
                height: 100vh;
                background: white;
                flex-direction: column;
                padding: 80px 25px 30px;
                transition: 0.3s ease-in-out;
                box-shadow: 2px 0 20px rgba(0,0,0,0.1);
                z-index: 1000;
                gap: 15px;
                align-items: flex-start;
                overflow-y: auto;
            }
            .nav-links.show { left: 0; }
            .nav-links a { 
                font-size: 16px; 
                padding: 10px 0;
                width: 100%;
                border-bottom: 1px solid #f0ebe0;
            }
            .nav-icons { margin-left: auto; margin-right: 15px; }
        }
        
        @media (max-width: 576px) {
            .nav-icons { gap: 12px; }
            .nav-icons a { font-size: 16px; }
            .auth-btn { padding: 5px 12px; font-size: 11px; }
            .logo { font-size: 22px; }
        }
        
        .main-container { max-width: 1400px; margin: 40px auto; padding: 0 20px; }
        .breadcrumb { margin-bottom: 28px; font-size: 13px; color: #8e9aaf; }
        .breadcrumb a { color: #c4a747; text-decoration: none; }
        
        .cart-layout { display: grid; grid-template-columns: 1fr 380px; gap: 30px; }
        @media (max-width: 900px) { .cart-layout { grid-template-columns: 1fr; } }
        
        .cart-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.03);
            overflow: hidden;
            border: 1px solid #f0ebe0;
        }
        .cart-header {
            padding: 20px;
            border-bottom: 1px solid #f0ede8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .cart-header h2 { font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: 10px; margin: 0; }
        .item-badge { background: #f3eee9; padding: 4px 12px; border-radius: 40px; font-size: 0.75rem; font-weight: 600; color: #5c4b44; }
        .clear-cart-btn {
            background: none;
            border: 1px solid #e8e2db;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #dc2626;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .cart-items-wrapper { padding: 15px; max-height: 600px; overflow-y: auto; }
        .cart-item {
            display: flex;
            gap: 15px;
            padding: 18px 0;
            border-bottom: 1px solid #f0ede8;
            flex-wrap: wrap;
        }
        .cart-item:last-child { border-bottom: none; }
        .product-image {
            width: 90px;
            height: 90px;
            background: #faf7f2;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }
        .product-image img { width: 100%; height: 100%; object-fit: cover; }
        .product-image i { font-size: 40px; color: #cbb99f; }
        .product-info { flex: 1; min-width: 160px; }
        .product-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
        .product-sku { font-size: 10px; color: #8e8c87; }
        .price-section { display: flex; gap: 10px; align-items: baseline; margin: 8px 0; flex-wrap: wrap; }
        .current-price { font-weight: 800; font-size: 1.1rem; color: #c4a747; }
        .old-price { font-size: 0.75rem; color: #a0aaba; text-decoration: line-through; }
        .discount-badge { background: #e8f5e9; color: #2e7d32; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; }
        .quantity-wrapper { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .qty-btn {
            background: #f8f6f3;
            border: 1px solid #e2dbd2;
            width: 30px;
            height: 30px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
        .qty-input {
            width: 50px;
            text-align: center;
            border: 1px solid #e2dbd2;
            border-radius: 12px;
            padding: 6px 0;
            font-weight: 600;
            background: white;
            font-size: 13px;
        }
        .item-line-total { font-weight: 700; margin-top: 10px; font-size: 13px; }
        .remove-item-btn {
            background: none;
            border: none;
            color: #dc2626;
            font-size: 0.75rem;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 30px;
            align-self: center;
        }
        
        @media (max-width: 576px) {
            .cart-item { flex-direction: column; }
            .product-image { width: 80px; height: 80px; }
            .remove-item-btn { align-self: flex-start; margin-left: 0; }
            .cart-header { flex-direction: column; align-items: stretch; text-align: center; }
            .clear-cart-btn { align-self: center; }
        }
        
        .empty-cart { text-align: center; padding: 50px 20px; }
        .empty-cart i { font-size: 60px; color: #ddd0c0; margin-bottom: 15px; }
        .shop-now-btn {
            display: inline-block;
            margin-top: 15px;
            background: #c4a747;
            color: white;
            padding: 10px 28px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }
        .shop-now-btn:hover { background: #a88930; transform: translateY(-2px); }
        
        .summary-card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            position: sticky;
            top: 100px;
            height: fit-content;
            border: 1px solid #f3ede5;
        }
        .summary-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 20px; border-left: 4px solid #c4a747; padding-left: 12px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; }
        .summary-divider { border-top: 1px dashed #e2dbd2; margin: 12px 0; }
        .total-row { font-weight: 800; font-size: 1.2rem; margin-top: 8px; }
        .checkout-btn {
            background: #2d2a24;
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            font-weight: 700;
            border-radius: 60px;
            font-size: 14px;
            margin-top: 20px;
            cursor: pointer;
        }
        .checkout-btn:hover { background: #c4a747; transform: translateY(-2px); }
        .secure-checkout { text-align: center; font-size: 0.7rem; color: #8e9aaf; margin-top: 12px; }
        .continue-link { display: block; text-align: center; margin-top: 15px; color: #c4a747; text-decoration: none; font-weight: 500; font-size: 0.8rem; }
        
        .toast-notify {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2d2a24;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 13px;
            z-index: 9999;
            animation: slideInRight 0.25s ease;
        }
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .footer { background: #1a1a18; color: #a0a09b; padding: 40px 0 20px; margin-top: 60px; text-align: center; }
        .footer-logo { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 700; color: white; margin-bottom: 10px; }
        .footer-logo span { color: #c4a747; }
        
        .back-to-top {
            position: fixed; bottom: 30px; left: 30px; width: 40px; height: 40px;
            background: #c4a747; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; color: white; cursor: pointer; opacity: 0;
            visibility: hidden; transition: 0.3s; z-index: 1000;
        }
        .back-to-top.show { opacity: 1; visibility: visible; }
        
        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #c4a747;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<nav class="navbar fixed-top">
    <div class="container">
        <a href="/" class="logo"><span>BAG</span></a>
        <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
        <div class="nav-links" id="navLinks">
            <a href="/">Home</a>
            <a href="/shop/">Shop</a>
            <a href="/collections/">Collections</a>
            <a href="/about/">About</a>
            <a href="/contact/">Contact</a>
        </div>
        <div class="nav-icons">
            <a href="/user/wishlist/"><i class="far fa-heart"></i><span class="wish-badge" id="wishlistCount">0</span></a>
            <a href="/user/cart/"><i class="fas fa-shopping-bag"></i><span class="cart-badge" id="cartCount">0</span></a>
            <div id="authContainer"></div>
        </div>
    </div>
</nav>
<div class="menu-overlay" id="menuOverlay"></div>

<div class="main-container">
    <div class="breadcrumb"><a href="/">Home</a> › <a href="/shop/">Shop</a> › <span>Shopping Cart</span></div>
    <div class="cart-layout">
        <div class="cart-card">
            <div class="cart-header">
                <h2><i class="fas fa-shopping-cart" style="color:#c4a747;"></i> Your Cart <span class="item-badge" id="cartTotalItems">0 items</span></h2>
                <button id="clearCartBtn" class="clear-cart-btn"><i class="fas fa-trash-alt"></i> Clear Cart</button>
            </div>
            <div id="cartItemsContainer" class="cart-items-wrapper"><div class="text-center py-5"><div class="loading-spinner"></div><p class="mt-3 text-muted">Loading your cart...</p></div></div>
        </div>
        <div class="summary-card">
            <div class="summary-title">Order Summary</div>
            <div class="summary-row"><span>Subtotal</span><span id="summarySubtotal">₹0.00</span></div>
            <div class="summary-row"><span>Discount</span><span id="summaryDiscount" style="color:#2e7d32;">-₹0.00</span></div>
            <div class="summary-row"><span>Shipping</span><span id="summaryShipping">Free</span></div>
            <div class="summary-divider"></div>
            <div class="summary-row total-row"><span>Total</span><span id="summaryTotal">₹0.00</span></div>
            <button id="proceedCheckoutBtn" class="checkout-btn"><i class="fas fa-lock"></i> Proceed to Checkout</button>
            <div class="secure-checkout"><i class="fas fa-shield-alt"></i> Secure payment & SSL encrypted</div>
            <a href="/shop/" class="continue-link"><i class="fas fa-arrow-left"></i> Continue Shopping</a>
        </div>
    </div>
</div>

<footer class="footer"><div class="container"><div class="footer-logo mb-2"><span>BAG</span></div><small>&copy; 2024 Bag. All rights reserved. | Crafted with ❤️</small></div></footer>
<div class="back-to-top" id="backToTop"><i class="fas fa-arrow-up"></i></div>

<script>
    // Mobile Menu Toggle
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const navLinks = document.getElementById('navLinks');
    const menuOverlay = document.getElementById('menuOverlay');
    function closeMenu() { navLinks.classList.remove('show'); menuOverlay.classList.remove('show'); if(mobileMenuBtn){const icon=mobileMenuBtn.querySelector('i');icon.classList.remove('fa-times');icon.classList.add('fa-bars');} document.body.style.overflow=''; }
    function openMenu() { navLinks.classList.add('show'); menuOverlay.classList.add('show'); if(mobileMenuBtn){const icon=mobileMenuBtn.querySelector('i');icon.classList.remove('fa-bars');icon.classList.add('fa-times');} document.body.style.overflow='hidden'; }
    if(mobileMenuBtn){ mobileMenuBtn.addEventListener('click',(e)=>{ e.stopPropagation(); if(navLinks.classList.contains('show')) closeMenu(); else openMenu(); }); }
    if(menuOverlay){ menuOverlay.addEventListener('click', closeMenu); }
    document.querySelectorAll('#navLinks a').forEach(link=>{ link.addEventListener('click', closeMenu); });
    
    const API_BASE = window.location.origin + '/api';
    let cartData = null;
    let updateInProgress = false;
    
    window.addEventListener('scroll', () => { document.querySelector('.navbar')?.classList.toggle('scrolled', window.scrollY > 50); });
    const backToTop = document.getElementById('backToTop');
    window.addEventListener('scroll', () => { backToTop.classList.toggle('show', window.scrollY > 300); });
    backToTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    
    function showToast(msg, isErr = false) { const t = document.createElement('div'); t.className = 'toast-notify'; t.style.backgroundColor = isErr ? '#dc2626' : '#2d2a24'; t.innerHTML = `<i class="fas ${isErr ? 'fa-exclamation-triangle' : 'fa-check-circle'} me-2"></i> ${msg}`; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
    function getAuthHeaders() { const token = localStorage.getItem('access_token'); return token ? { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' } : {}; }
    
    function updateAuthUI() {
        const token = localStorage.getItem('access_token');
        const auth = document.getElementById('authContainer');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (token) {
            auth.innerHTML = `<div class="user-menu"><a href="#" class="auth-btn"><i class="fas fa-user-circle me-1"></i> ${user.full_name || user.email?.split('@')[0] || 'My Account'} <i class="fas fa-chevron-down ms-1"></i></a><div class="user-dropdown"><a href="/user/dashboard/">Dashboard</a><a href="/user/orders/">My Orders</a><a href="/user/wishlist/">Wishlist</a><a href="/user/profile/">Profile</a><a href="/user/cart/">Cart</a><hr><a href="#" id="logoutBtn">Logout</a></div></div>`;
            document.getElementById('logoutBtn')?.addEventListener('click', (e) => { e.preventDefault(); localStorage.clear(); showToast('Logged out'); setTimeout(() => location.reload(), 1000); });
        } else { auth.innerHTML = `<a href="/login/" class="auth-btn"><i class="fas fa-sign-in-alt me-1"></i> Sign In</a>`; }
    }
    
    async function updateBadges() {
        const token = localStorage.getItem('access_token');
        if (token) {
            try {
                const [cartRes, wishRes] = await Promise.all([fetch(`${API_BASE}/cart/`, { headers: { 'Authorization': `Bearer ${token}` } }), fetch(`${API_BASE}/wishlist/`, { headers: { 'Authorization': `Bearer ${token}` } })]);
                if (cartRes.ok) { const d = await cartRes.json(); document.getElementById('cartCount').innerText = d.cart?.total_items || 0; }
                if (wishRes.ok) { const w = await wishRes.json(); document.getElementById('wishlistCount').innerText = w.wishlist?.items?.length || 0; }
            } catch(e) {}
        } else { document.getElementById('cartCount').innerText = '0'; document.getElementById('wishlistCount').innerText = '0'; }
    }
    
    async function loadCart() {
        const container = document.getElementById('cartItemsContainer');
        container.innerHTML = '<div class="text-center py-5"><div class="loading-spinner"></div><p class="mt-3 text-muted">Loading your cart...</p></div>';
        const token = localStorage.getItem('access_token');
        if (!token) {
            container.innerHTML = `<div class="empty-cart"><i class="fas fa-shopping-bag"></i><h3>Please login to view your cart</h3><p>Sign in to see items you've added</p><a href="/login/" class="shop-now-btn">Login Now</a></div>`;
            updateSummary(null);
            return;
        }
        try {
            const response = await fetch(`${API_BASE}/cart/`, { headers: getAuthHeaders() });
            if (response.ok) { const data = await response.json(); cartData = data.cart; renderCart(); updateSummary(); updateBadges(); }
            else if (response.status === 401) { localStorage.clear(); window.location.href = '/login/'; }
            else { container.innerHTML = '<div class="text-center py-5 text-danger">Failed to load cart</div>'; }
        } catch(e) { container.innerHTML = '<div class="text-center py-5 text-danger">Error loading cart</div>'; }
    }
    
    function renderCart() {
        const container = document.getElementById('cartItemsContainer');
        const totalItemsSpan = document.getElementById('cartTotalItems');
        if (!cartData || !cartData.items || cartData.items.length === 0) {
            container.innerHTML = `<div class="empty-cart"><i class="fas fa-shopping-bag"></i><h3>Your cart is empty</h3><p>Add some beautiful bags to your cart</p><a href="/shop/" class="shop-now-btn">Start Shopping</a></div>`;
            totalItemsSpan.innerText = '0 items';
            return;
        }
        totalItemsSpan.innerText = `${cartData.total_items} item${cartData.total_items !== 1 ? 's' : ''}`;
        let html = '';
        cartData.items.forEach((item) => {
            const bag = item.bag_details;
            const hasDiscount = bag.discount_price && bag.discount_price < bag.price;
            const discountPercent = hasDiscount ? Math.round(((bag.price - bag.discount_price) / bag.price) * 100) : 0;
            html += `<div class="cart-item" data-item-id="${item.id}"><div class="product-image">${bag.image ? `<img src="${bag.image}" alt="${escapeHtml(bag.name)}">` : `<i class="fas fa-bag-shopping"></i>`}</div><div class="product-info"><div class="product-title">${escapeHtml(bag.name)}</div><div class="product-sku">SKU: ${bag.sku || 'N/A'}</div><div class="price-section"><span class="current-price">₹${parseFloat(item.bag_price).toFixed(2)}</span>${hasDiscount ? `<span class="old-price">₹${parseFloat(bag.price).toFixed(2)}</span><span class="discount-badge">-${discountPercent}%</span>` : ''}</div><div class="quantity-wrapper"><button class="qty-btn dec-qty" data-id="${item.id}">−</button><input type="number" class="qty-input" data-id="${item.id}" value="${item.quantity}" min="1" max="99" step="1"><button class="qty-btn inc-qty" data-id="${item.id}">+</button></div><div class="item-line-total">Item total: ₹${parseFloat(item.total_price).toFixed(2)}</div></div><button class="remove-item-btn" data-id="${item.id}"><i class="fas fa-trash-alt"></i> Remove</button></div>`;
        });
        container.innerHTML = html;
        attachCartEvents();
    }
    
    function updateSummary() {
        if (!cartData) { document.getElementById('summarySubtotal').innerText = '₹0.00'; document.getElementById('summaryDiscount').innerHTML = '₹0.00'; document.getElementById('summaryTotal').innerHTML = '₹0.00'; return; }
        const subtotal = cartData.subtotal || 0;
        const discount = cartData.total_discount || 0;
        const total = cartData.total || subtotal;
        document.getElementById('summarySubtotal').innerText = `₹${parseFloat(subtotal).toFixed(2)}`;
        document.getElementById('summaryDiscount').innerHTML = discount > 0 ? `-₹${parseFloat(discount).toFixed(2)}` : `₹0.00`;
        document.getElementById('summaryTotal').innerHTML = `₹${parseFloat(total).toFixed(2)}`;
    }
    
    async function updateQuantity(itemId, newQuantity) {
        if (updateInProgress) return;
        updateInProgress = true;
        try {
            const response = await fetch(`${API_BASE}/cart/update/${itemId}/`, { method: 'PUT', headers: getAuthHeaders(), body: JSON.stringify({ quantity: newQuantity }) });
            if (response.ok) { const data = await response.json(); cartData = data.cart; renderCart(); updateSummary(); updateBadges(); showToast('Cart updated'); }
            else { const err = await response.json(); showToast(err.error || 'Failed to update', true); await loadCart(); }
        } catch(e) { showToast('Network error', true); await loadCart(); }
        finally { updateInProgress = false; }
    }
    
    async function removeItem(itemId) {
        if (updateInProgress) return;
        updateInProgress = true;
        try {
            const response = await fetch(`${API_BASE}/cart/remove/${itemId}/`, { method: 'DELETE', headers: getAuthHeaders() });
            if (response.ok) { const data = await response.json(); cartData = data.cart; renderCart(); updateSummary(); updateBadges(); showToast('Item removed'); }
            else { const err = await response.json(); showToast(err.error || 'Failed to remove', true); }
        } catch(e) { showToast('Network error', true); }
        finally { updateInProgress = false; }
    }
    
    async function clearCart() {
        if (!confirm('Remove all items from your cart?')) return;
        if (updateInProgress) return;
        updateInProgress = true;
        try {
            const response = await fetch(`${API_BASE}/cart/clear/`, { method: 'DELETE', headers: getAuthHeaders() });
            if (response.ok) { cartData = { items: [], total_items: 0, subtotal: 0, total_discount: 0, total: 0 }; renderCart(); updateSummary(); updateBadges(); showToast('Cart cleared'); }
            else { showToast('Failed to clear cart', true); }
        } catch(e) { showToast('Network error', true); }
        finally { updateInProgress = false; }
    }
    
    function attachCartEvents() {
        document.querySelectorAll('.dec-qty').forEach(btn => { btn.onclick = () => { const id = parseInt(btn.dataset.id); const input = document.querySelector(`.qty-input[data-id="${id}"]`); if(input) { const newVal = Math.max(1, parseInt(input.value) - 1); input.value = newVal; updateQuantity(id, newVal); } }; });
        document.querySelectorAll('.inc-qty').forEach(btn => { btn.onclick = () => { const id = parseInt(btn.dataset.id); const input = document.querySelector(`.qty-input[data-id="${id}"]`); if(input) { const newVal = Math.min(99, parseInt(input.value) + 1); input.value = newVal; updateQuantity(id, newVal); } }; });
        document.querySelectorAll('.qty-input').forEach(inp => { inp.onchange = () => { const id = parseInt(inp.dataset.id); let val = parseInt(inp.value); if(isNaN(val) || val < 1) val = 1; if(val > 99) val = 99; inp.value = val; updateQuantity(id, val); }; });
        document.querySelectorAll('.remove-item-btn').forEach(btn => { btn.onclick = () => { const id = parseInt(btn.dataset.id); removeItem(id); }; });
    }
    
    function proceedToCheckout() { if (!cartData || !cartData.items || cartData.items.length === 0) { showToast('Your cart is empty', true); return; } window.location.href = '/user/checkout/'; }
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }
    
    document.getElementById('clearCartBtn')?.addEventListener('click', clearCart);
    document.getElementById('proceedCheckoutBtn')?.addEventListener('click', proceedToCheckout);
    
    updateAuthUI();
    loadCart();
    updateBadges();
</script>
</body>
</html>
